name: Poll ESPN scores

on:
  schedule:
    # Every 30 minutes. The script itself exits early outside the
    # tournament window (2026-06-11 → 2026-07-20).
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - smoke

permissions:
  contents: read

concurrency:
  group: poll-espn
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Run poller
        run: |
          if [ "${{ inputs.mode }}" = "smoke" ]; then
            npm run poll-espn -- --smoke
          else
            npm run poll-espn
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
